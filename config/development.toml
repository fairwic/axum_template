[server]
host = "0.0.0.0"
port = 3000

[database]
url = "postgres://postgres:postgres123@localhost:5432/testdb"

[redis]
url = "redis://localhost:16379"
max_connections = 10

[cache]
default_ttl_secs = 300

[runtime]
cache_provider = "memory"
lbs_provider = "noop"

[scylla]
contact_points = ["localhost:9042"]
keyspace = "catalog"
product_table_prefix = "product_by_id"
shop_table_prefix = "shop_by_id"
auto_create = true
