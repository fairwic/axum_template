[server]
host = "0.0.0.0"
port = 3000

[database]
url = "postgres://postgres:postgres123@localhost:5432/testdb"
max_connections = 20
min_connections = 5
acquire_timeout_secs = 3
idle_timeout_secs = 600
max_lifetime_secs = 1800

[redis]
url = "redis://localhost:16379"
max_connections = 10

[cache]
default_ttl_secs = 300

[auth]
jwt_secret = "dev-secret"
jwt_ttl_secs = 604800

[wechat]
app_id = ""
app_secret = ""
api_base = "https://api.weixin.qq.com"
timeout_secs = 3

[sms]
login_code_ttl_secs = 300
