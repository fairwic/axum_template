name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  RUST_VERSION: "1.88"
  BIN_NAME: axum-server
  BIN_PACKAGE: axum-server
  IMAGE_NAME: bjd-server
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build & Push Image (GHCR)
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 在 amazonlinux:2023 里编译，保证和服务器环境更一致（避免 glibc/openssl 坑）
      - name: Build binary in Amazon Linux container
        run: |
          docker run --rm -t \
            -v "$PWD:/work" -w /work \
            amazonlinux:2023 bash -lc '
              set -euo pipefail
              dnf -y update
              dnf -y install git gcc clang lld openssl-devel pkgconfig make tar gzip
              curl -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain '"${RUST_VERSION}"'
              source "$HOME/.cargo/env"
              rustup component add rustfmt clippy

              export RUSTFLAGS="-C link-arg=-fuse-ld=lld"
              export CARGO_REGISTRIES_CRATES_IO_PROTOCOL=sparse
              # 没提交 sqlx-data.json 就别开
              # export SQLX_OFFLINE=true

              cargo fmt --all -- --check
              cargo clippy --workspace --all-targets -- -D warnings
              cargo test --workspace
              cargo build -p '"${BIN_PACKAGE}"' --release

              rm -rf dist && mkdir -p dist
              cp target/release/'"${BIN_NAME}"' dist/'"${BIN_NAME}"'
              (cd dist && sha256sum '"${BIN_NAME}"' > sha256.txt)
              ls -lah dist
            '

      - name: Upload artifact (optional)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BIN_NAME }}-${{ github.sha }}
          path: dist/
          if-no-files-found: error
          retention-days: 14

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=long

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.runtime
          platforms: linux/amd64
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy on Server (docker compose pull + up)
    runs-on: ubuntu-24.04
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via SSH
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            set -euo pipefail
            cd "${SERVER_APP_PATH}"
            docker compose pull
            docker compose up -d --remove-orphans
            docker ps --format "table {{.Names}}\t{{.Image}}\t{{.Status}}" | sed -n '1,10p'
          EOF
        env:
          SERVER_APP_PATH: ${{ secrets.SERVER_APP_PATH }}
