name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      rollback_service:
        description: "手动回滚服务名（留空使用默认稳定服务）"
        required: false
        default: ""
      rollback_image:
        description: "手动回滚镜像（留空使用上次发布快照）"
        required: false
        default: ""

env:
  BIN_NAME: axum-server
  IMAGE_NAME: bjd-server
  REGISTRY: ghcr.io

jobs:
  verify:
    name: Verify (fmt/clippy/test)
    runs-on: ubuntu-24.04
    if: github.event_name != 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
          components: rustfmt, clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Guard removed compatibility crate
        run: ./scripts/ci/guard-no-axum-common.sh

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Unit tests
        run: cargo test --workspace --quiet

  sqlx-offline:
    name: SQLx Offline Guard
    runs-on: ubuntu-24.04
    if: github.event_name != 'workflow_dispatch'

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres123
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d testdb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://postgres:postgres123@localhost:5432/testdb

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install SQLx CLI
        run: cargo install sqlx-cli --locked --no-default-features --features postgres

      - name: Run migrations
        run: cargo sqlx migrate run

      - name: SQLx prepare check
        run: cargo sqlx prepare --workspace --check

      - name: Offline compile check
        run: SQLX_OFFLINE=true cargo check --workspace --quiet

  security:
    name: Security (audit/deny)
    runs-on: ubuntu-24.04
    if: github.event_name != 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Cargo audit (retry)
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if cargo audit; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              sleep_seconds=$((attempt * 10))
              echo "cargo audit failed (attempt ${attempt}/3), retrying in ${sleep_seconds}s..."
              sleep "${sleep_seconds}"
            fi
          done
          echo "cargo audit failed after 3 attempts"
          exit 1

      - name: Cargo deny advisories (retry)
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if cargo deny check advisories; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              sleep_seconds=$((attempt * 10))
              echo "cargo deny advisories failed (attempt ${attempt}/3), retrying in ${sleep_seconds}s..."
              sleep "${sleep_seconds}"
            fi
          done
          echo "cargo deny advisories failed after 3 attempts"
          exit 1

      - name: Cargo deny policy
        run: cargo deny check bans licenses sources

  coverage:
    name: Coverage Baseline (application/domain)
    runs-on: ubuntu-24.04
    if: github.event_name != 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
          components: llvm-tools-preview

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Coverage baseline gate
        env:
          COVERAGE_MIN_LINES: "70"
          COVERAGE_MIN_FUNCTIONS: "60"
        run: ./scripts/ci/coverage-baseline.sh

  build-and-push:
    name: Build & Push Image (GHCR)
    runs-on: ubuntu-24.04
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [verify, sqlx-offline, security, coverage]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build binary in Amazon Linux container
        run: |
          docker run --rm -t \
            -v "$PWD:/work" -w /work \
            amazonlinux:2023 bash -lc '
              set -euo pipefail
              dnf -y update
              dnf -y install git gcc clang lld openssl-devel pkgconfig make tar gzip
              curl -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain 1.88.0
              source "$HOME/.cargo/env"

              export RUSTFLAGS="-C link-arg=-fuse-ld=lld"
              export CARGO_REGISTRIES_CRATES_IO_PROTOCOL=sparse

              cargo build -p axum-server --release

              rm -rf dist && mkdir -p dist
              cp target/release/axum-server dist/axum-server
              (cd dist && sha256sum axum-server > sha256.txt)
              ls -lah dist
            '

      - name: Upload artifact (optional)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BIN_NAME }}-${{ github.sha }}
          path: dist/
          if-no-files-found: error
          retention-days: 14

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=long

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.runtime
          platforms: linux/amd64
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-canary:
    name: Deploy Canary (approval)
    runs-on: ubuntu-24.04
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
    concurrency:
      group: production-deploy
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Canary rollout
        run: ./scripts/deploy/deploy_canary.sh
        env:
          DEPLOY_SSH_USER: ${{ secrets.SSH_USER }}
          DEPLOY_SSH_HOST: ${{ secrets.SSH_HOST }}
          SERVER_APP_PATH: ${{ secrets.SERVER_APP_PATH }}
          DEPLOY_COMPOSE_FILE: ${{ vars.DEPLOY_COMPOSE_FILE || 'docker-compose.yml' }}
          DEPLOY_CANARY_SERVICE: ${{ vars.DEPLOY_CANARY_SERVICE || 'axum-server-canary' }}
          DEPLOY_CANARY_HEALTHCHECK_URL: ${{ vars.DEPLOY_CANARY_HEALTHCHECK_URL }}
          DEPLOY_HEALTHCHECK_RETRIES: ${{ vars.DEPLOY_HEALTHCHECK_RETRIES }}
          DEPLOY_HEALTHCHECK_INTERVAL_SECONDS: ${{ vars.DEPLOY_HEALTHCHECK_INTERVAL_SECONDS }}
          DEPLOY_IMAGE: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}

  deploy-stable:
    name: Promote Stable
    runs-on: ubuntu-24.04
    needs: deploy-canary
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Promote stable service
        run: ./scripts/deploy/promote_stable.sh
        env:
          DEPLOY_SSH_USER: ${{ secrets.SSH_USER }}
          DEPLOY_SSH_HOST: ${{ secrets.SSH_HOST }}
          SERVER_APP_PATH: ${{ secrets.SERVER_APP_PATH }}
          DEPLOY_COMPOSE_FILE: ${{ vars.DEPLOY_COMPOSE_FILE || 'docker-compose.yml' }}
          DEPLOY_STABLE_SERVICE: ${{ vars.DEPLOY_STABLE_SERVICE || 'axum-server' }}
          DEPLOY_STABLE_HEALTHCHECK_URL: ${{ vars.DEPLOY_STABLE_HEALTHCHECK_URL }}
          DEPLOY_HEALTHCHECK_RETRIES: ${{ vars.DEPLOY_HEALTHCHECK_RETRIES }}
          DEPLOY_HEALTHCHECK_INTERVAL_SECONDS: ${{ vars.DEPLOY_HEALTHCHECK_INTERVAL_SECONDS }}
          DEPLOY_IMAGE: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}

  rollback-on-failure:
    name: Rollback On Failure
    runs-on: ubuntu-24.04
    needs: [deploy-canary, deploy-stable]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && always() && (needs.deploy-canary.result == 'failure' || needs.deploy-stable.result == 'failure')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Rollback canary
        if: needs.deploy-canary.result == 'failure'
        run: ./scripts/deploy/rollback.sh
        env:
          DEPLOY_SSH_USER: ${{ secrets.SSH_USER }}
          DEPLOY_SSH_HOST: ${{ secrets.SSH_HOST }}
          SERVER_APP_PATH: ${{ secrets.SERVER_APP_PATH }}
          DEPLOY_COMPOSE_FILE: ${{ vars.DEPLOY_COMPOSE_FILE || 'docker-compose.yml' }}
          DEPLOY_ROLLBACK_SERVICE: ${{ vars.DEPLOY_CANARY_SERVICE || 'axum-server-canary' }}

      - name: Rollback stable
        if: needs.deploy-stable.result == 'failure'
        run: ./scripts/deploy/rollback.sh
        env:
          DEPLOY_SSH_USER: ${{ secrets.SSH_USER }}
          DEPLOY_SSH_HOST: ${{ secrets.SSH_HOST }}
          SERVER_APP_PATH: ${{ secrets.SERVER_APP_PATH }}
          DEPLOY_COMPOSE_FILE: ${{ vars.DEPLOY_COMPOSE_FILE || 'docker-compose.yml' }}
          DEPLOY_ROLLBACK_SERVICE: ${{ vars.DEPLOY_STABLE_SERVICE || 'axum-server' }}

  rollback-manual:
    name: Manual Rollback
    runs-on: ubuntu-24.04
    if: github.event_name == 'workflow_dispatch'
    environment:
      name: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Rollback by dispatch input
        run: ./scripts/deploy/rollback.sh
        env:
          DEPLOY_SSH_USER: ${{ secrets.SSH_USER }}
          DEPLOY_SSH_HOST: ${{ secrets.SSH_HOST }}
          SERVER_APP_PATH: ${{ secrets.SERVER_APP_PATH }}
          DEPLOY_COMPOSE_FILE: ${{ vars.DEPLOY_COMPOSE_FILE || 'docker-compose.yml' }}
          DEPLOY_ROLLBACK_SERVICE: ${{ inputs.rollback_service }}
          DEPLOY_ROLLBACK_IMAGE: ${{ inputs.rollback_image }}
