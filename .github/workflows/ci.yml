name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  BIN_NAME: axum-server
  IMAGE_NAME: bjd-server
  REGISTRY: ghcr.io

jobs:
  verify:
    name: Verify (fmt/clippy/test)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
          components: rustfmt, clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Guard removed compatibility crate
        run: ./scripts/ci/guard-no-axum-common.sh

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Unit tests
        run: cargo test --workspace --quiet

  sqlx-offline:
    name: SQLx Offline Guard
    runs-on: ubuntu-24.04

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres123
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d testdb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://postgres:postgres123@localhost:5432/testdb

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install SQLx CLI
        run: cargo install sqlx-cli --locked --no-default-features --features postgres

      - name: Run migrations
        run: cargo sqlx migrate run

      - name: SQLx prepare check
        run: cargo sqlx prepare --workspace --check

      - name: Offline compile check
        run: SQLX_OFFLINE=true cargo check --workspace --quiet

  security:
    name: Security (audit/deny)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Cargo audit (retry)
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if cargo audit; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              sleep_seconds=$((attempt * 10))
              echo "cargo audit failed (attempt ${attempt}/3), retrying in ${sleep_seconds}s..."
              sleep "${sleep_seconds}"
            fi
          done
          echo "cargo audit failed after 3 attempts"
          exit 1

      - name: Cargo deny advisories (retry)
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if cargo deny check advisories; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              sleep_seconds=$((attempt * 10))
              echo "cargo deny advisories failed (attempt ${attempt}/3), retrying in ${sleep_seconds}s..."
              sleep "${sleep_seconds}"
            fi
          done
          echo "cargo deny advisories failed after 3 attempts"
          exit 1

      - name: Cargo deny policy
        run: cargo deny check bans licenses sources

  build-and-push:
    name: Build & Push Image (GHCR)
    runs-on: ubuntu-24.04
    needs: [verify, sqlx-offline, security]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build binary in Amazon Linux container
        run: |
          docker run --rm -t \
            -v "$PWD:/work" -w /work \
            amazonlinux:2023 bash -lc '
              set -euo pipefail
              dnf -y update
              dnf -y install git gcc clang lld openssl-devel pkgconfig make tar gzip
              curl -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain 1.88.0
              source "$HOME/.cargo/env"

              export RUSTFLAGS="-C link-arg=-fuse-ld=lld"
              export CARGO_REGISTRIES_CRATES_IO_PROTOCOL=sparse

              cargo build -p axum-server --release

              rm -rf dist && mkdir -p dist
              cp target/release/axum-server dist/axum-server
              (cd dist && sha256sum axum-server > sha256.txt)
              ls -lah dist
            '

      - name: Upload artifact (optional)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BIN_NAME }}-${{ github.sha }}
          path: dist/
          if-no-files-found: error
          retention-days: 14

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=long

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.runtime
          platforms: linux/amd64
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy on Server (docker compose pull + up)
    runs-on: ubuntu-24.04
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via SSH
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF2'
            set -euo pipefail
            cd "${SERVER_APP_PATH}"
            docker compose pull
            docker compose up -d --remove-orphans
            docker ps --format "table {{.Names}}\t{{.Image}}\t{{.Status}}" | sed -n '1,10p'
          EOF2
        env:
          SERVER_APP_PATH: ${{ secrets.SERVER_APP_PATH }}
