version: "3.8"

services:
  postgres:
    image: postgres:16
    container_name: postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: testdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    volumes:
      - pgdata:/var/lib/postgresql/data
  redis:
    image: redis:7
    container_name: axum-redis
    restart: always
    ports:
      - "16379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
